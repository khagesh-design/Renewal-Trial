name: Daily PDF Data Update

on:
  schedule:
    - cron: '0 0 * * *' # Runs at midnight every day
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo content
        uses: actions/checkout@v2

      - name: Setup python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pdfplumber pandas openpyxl

      - name: Debug: check Drive path and workspace
        run: |
          echo "PWD: $PWD"
          echo "Listing workspace root:"
          ls -la
          DRIVE_PATH="/content/drive/MyDrive/Iris Blue Agency/Motor/2026/Renewal-2026/July 26/SCH,DN,VIG&CERT"
          DIR_PARENT="/content/drive/MyDrive/Iris Blue Agency/Motor/2026/Renewal-2026/July 26"
          if [ -d "$DRIVE_PATH" ]; then
            echo "Drive folder exists: $DRIVE_PATH"
            ls -la "$DRIVE_PATH"
          elif [ -d "$DIR_PARENT" ]; then
            echo "Parent dir exists but target folder missing; listing parent:"
            ls -la "$DIR_PARENT"
          else
            echo "Drive path missing: $DRIVE_PATH"
          fi

      - name: Execute script
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f "Compiled_Data.xlsx" ]; then
            git add "Compiled_Data.xlsx"
            # If there are no staged changes, skip commit
            if git diff --cached --quiet; then
              echo "No staged changes to commit"
            else
              git commit -m "Daily update of extracted data"
              git push
            fi
          else
            echo "Compiled_Data.xlsx not found, skipping commit"
          fi
